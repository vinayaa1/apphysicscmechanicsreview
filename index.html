<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Physics C: Mechanics — Formula Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7b8299;
    --hint: #4a5168;
    --accent: #efc3ff;
    --accent2: #e8eaf0;
    --tag-bg: rgba(74,222,128,0.1);
    --tag: #e8eaf0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --serif: 'Libre Baskerville', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
 
  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 0.5px solid var(--border);
    max-width: 900px;
    margin: 0 auto;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--tag);
    background: var(--tag-bg);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.2;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  header p {
    font-size: 15px;
    color: var(--muted);
  }
