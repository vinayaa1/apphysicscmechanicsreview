<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Physics C: Mechanics — Formula Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Libre+Baskerville:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e1117;
    --surface: #161b27;
    --surface2: #1e2535;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --muted: #7b8299;
    --hint: #4a5168;
    --accent: #efc3ff;
    --accent2: #e8eaf0;
    --tag-bg: rgba(74,222,128,0.1);
    --tag: #e8eaf0;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --serif: 'Libre Baskerville', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
 
  header {
    padding: 3rem 2rem 2rem;
    border-bottom: 0.5px solid var(--border);
    max-width: 900px;
    margin: 0 auto;
  }
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--tag);
    background: var(--tag-bg);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 1rem;
  }
  header h1 {
    font-family: var(--serif);
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 400;
    line-height: 1.2;
    color: #fff;
    margin-bottom: 0.5rem;
  }
  header p {
    font-size: 15px;
    color: var(--muted);
  }

   nav {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(14,17,23,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    max-width: 100%;
    overflow-x: auto;
    white-space: nowrap;
  }
  .nav-inner {
    display: inline-flex;
    gap: 0;
    max-width: 900px;
    margin: 0 auto;
  }
  nav a {
    display: inline-block;
    padding: 14px 18px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
  }
  nav a:hover { color: var(--text); }
  nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
  }
 
  .section {
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
 
  .section-heading {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 400;
    color: #fff;
    margin-bottom: 1.5rem;
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 620px) { .grid, .grid-3 { grid-template-columns: 1fr; } }
 
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--accent);
    margin-bottom: 1rem;
  }
